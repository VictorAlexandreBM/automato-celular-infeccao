<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automato Celular</title>
    <link rel="stylesheet" href="css/style.min.css">
    <link rel="icon" type="image/x-icon" href="/assets/agente-patologico.png">
</head>
<body class="bg-gray-100 flex flex-col items-center min-h-screen text-gray-800 font-sans py-8">

<div class="mb-8 text-center">
    <h1 class="text-4xl font-extrabold text-gray-900">Autômato celular</h1>
</div>

<div class="mb-8 text-center">
    <img src="assets/agente-patologico.png" width="150" alt="Agênte Patológico">
</div>

<div class="w-full max-w-5xl px-4">

    <div class="container-parametrizacoes grid grid-cols-1 md:grid-cols-2 gap-6 items-start">

        <section class="container-infeccao bg-white p-6 rounded-lg shadow-md grid grid-cols-2 gap-4">
            <div class="col-span-2 border-b pb-2 mb-2">
                <h2 class="text-2xl font-bold text-gray-800">Parâmetros de Infecção</h2>
            </div>

            <div class="col-span-1">
                <label for="input-infeccao-mascara" class="block text-sm font-medium text-gray-700 mb-1">Prob. infecção (com máscara)</label>
                <input id="input-infeccao-mascara" type="number" placeholder="0.1" step="0.1" max="1" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-1">
                <label for="input-infeccao" class="block text-sm font-medium text-gray-700 mb-1">Prob. infecção (sem máscara)</label>
                <input id="input-infeccao" type="number" placeholder="0.1" step="0.1" max="1" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-2">
                <label for="input-infeccao-ms" class="block text-sm font-medium text-gray-700 mb-1">Milissegundos entre rodadas</label>
                <input id="input-infeccao-ms" type="number" placeholder="5000" step="100" max="10000" min="100" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-2 mt-2">
                <label class="block text-sm font-bold text-gray-800 border-b pb-1">Tempo Simulado Decorrido Entre Rodadas</label>
            </div>

            <div class="inputs-tempo col-span-2 grid grid-cols-3 gap-4">
                <div>
                    <label for="input-infeccao-anos" class="block text-xs font-medium text-gray-700 mb-1">Anos</label>
                    <input id="input-infeccao-anos" type="number" step="1" max="100" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
                </div>
                <div>
                    <label for="input-infeccao-meses" class="block text-xs font-medium text-gray-700 mb-1">Meses</label>
                    <input id="input-infeccao-meses" type="number" step="1" max="100" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
                </div>
                <div>
                    <label for="input-infeccao-dias" class="block text-xs font-medium text-gray-700 mb-1">Dias</label>
                    <input id="input-infeccao-dias" type="number" step="1" max="100" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
                </div>
                <div>
                    <label for="input-infeccao-horas" class="block text-xs font-medium text-gray-700 mb-1">Horas</label>
                    <input id="input-infeccao-horas" type="number" step="1" max="100" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
                </div>
                <div>
                    <label for="input-infeccao-minutos" class="block text-xs font-medium text-gray-700 mb-1">Minutos</label>
                    <input id="input-infeccao-minutos" type="number" step="1" max="100" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
                </div>
                <div>
                    <label for="input-infeccao-segundos" class="block text-xs font-medium text-gray-700 mb-1">Segundos</label>
                    <input id="input-infeccao-segundos" type="number" step="1" max="100" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
                </div>
            </div>
        </section>

        <section class="container-inicializacao bg-white p-6 rounded-lg shadow-md grid grid-cols-2 gap-4">
            <div class="col-span-2 border-b pb-2 mb-2">
                <h2 class="text-2xl font-bold text-gray-800">Parâmetros de Inicialização</h2>
                <h4 class="text-sm text-red-600 font-medium">Apenas serão efetivados após reinicialização</h4>
            </div>

            <div class="col-span-2">
                <label for="input-mascara" class="block text-sm font-medium text-gray-700 mb-1">Prob. de ser uma pessoa com máscara</label>
                <input id="input-mascara" type="number" step="0.1" max="1" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-2">
                <label for="input-vacinada" class="block text-sm font-medium text-gray-700 mb-1">Prob. de ser uma pessoa vacinada</label>
                <input id="input-vacinada" type="number" step="0.1" max="1" min="0" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-1">
                <label for="input-linhas" class="block text-sm font-medium text-gray-700 mb-1">Qtd. de linhas</label>
                <input id="input-linhas" type="number" step="1" max="200" min="1" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-1">
                <label for="input-colunas" class="block text-sm font-medium text-gray-700 mb-1">Qtd. de colunas</label>
                <input id="input-colunas" type="number" step="1" max="200" min="1" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>

            <div class="col-span-2">
                <label for="input-celulas" class="block text-sm font-medium text-gray-700 mb-1">Tamanho das células</label>
                <input id="input-celulas" type="number" step="1" max="200" min="1" class="w-full border border-gray-300 rounded-md p-2 focus:ring-2 focus:ring-blue-500 outline-none transition-all"/>
            </div>
        </section>

        <section class="container-insercao col-span-1 md:col-span-2 bg-white p-6 rounded-lg shadow-md grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="col-span-2 md:col-span-4 border-b pb-2 mb-2">
                <h2 class="text-2xl font-bold text-gray-800">Estado selecionado para inserção</h2>
            </div>

            <button id="botao-insercao-0" class="botao botao-insercao flex flex-col items-center justify-center p-3 bg-gray-800 text-white rounded hover:bg-gray-700 transition-colors cursor-pointer">
                <span class="botao-insercao-texto mb-2 text-sm font-medium">Não infectado</span>
                <div id="quadrado-0" class="quadrado quadrado-0"></div>
            </button>

            <button id="botao-insercao-1" class="botao botao-insercao flex flex-col items-center justify-center p-3 bg-gray-800 text-white rounded hover:bg-gray-700 transition-colors cursor-pointer">
                <span class="botao-insercao-texto mb-2 text-sm font-medium">Infectado</span>
                <div id="quadrado-1" class="quadrado quadrado-1"></div>
            </button>

            <button id="botao-insercao-2" class="botao botao-insercao flex flex-col items-center justify-center p-3 bg-gray-800 text-white rounded hover:bg-gray-700 transition-colors cursor-pointer">
                <span class="botao-insercao-texto mb-2 text-sm font-medium">Com Máscara</span>
                <div id="quadrado-2" class="quadrado quadrado-2"></div>
            </button>

            <button id="botao-insercao-3" class="botao botao-insercao flex flex-col items-center justify-center p-3 bg-gray-800 text-white rounded hover:bg-gray-700 transition-colors cursor-pointer">
                <span class="botao-insercao-texto mb-2 text-sm font-medium">Vacinado</span>
                <div id="quadrado-3" class="quadrado quadrado-3"></div>
            </button>
        </section>

    </div>

    <div class="container-rodadas flex flex-col items-center gap-2 my-8">
        <h2 id="display-rodada" class="text-xl font-semibold text-gray-700">Rodada Atual: 0</h2>
        <h2 id="display-tempo-decorrido" class="text-xl font-semibold text-gray-700">Tempo Decorrido: 00:00.000</h2>
        <h2 id="display-tempo-decorrido-simulado" class="text-lg font-medium text-gray-600 text-center">Tempo decorrido simulado: 0 anos, 0 meses, 0 dias, 0 horas, 0 minutos e 0 segundos</h2>
    </div>

    <div class="container-botoes flex justify-center gap-4 mb-8">
        <button id="botao-ligar" class="botao bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-6 rounded shadow transition-colors">
            Iniciar Simulação
        </button>
        <button id="botao-reiniciar" class="botao bg-yellow-600 hover:bg-yellow-700 text-white font-bold py-3 px-6 rounded shadow transition-colors">
            Reiniciar
        </button>
    </div>
</div>

<div id="canvas-container" class="w-full max-w-5xl max-h-[80vh] overflow-auto border border-gray-300 mb-8 bg-white shadow-inner flex justify-center"></div>

<script type="module" src="js/interface.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
