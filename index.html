<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>automato-celular</title>
    <link rel="stylesheet" href="css/style.css">
    <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
    <style>
    </style>
</head>
<body>
    
<div style="margin: 20px 0;">
<h1>Autômato celular</h1>
</div>
    <div id="canvas-container"></div> 
<div>
    <div class="container-botoes">
        <button id="botao-ligar" class="botao">
            Iniciar Simulação
        </button>
        <button id="botao-reiniciar" class="botao">
            Reiniciar
        </button>
    </div>
    <div class="container-rodadas">
        <h2 id="display-rodada">Rodada Atual: 0</h2>
    </div>
    <div class="container-parametrizacoes">

        <section class="container-insercao">
            <div style="grid-column: 1 / span 2">
                <h1>Estado Selecionado para inserção</h1>    
            </div>
            <button id="botao-insercao-0" class="botao botao-insercao">
                <span class="botao-insercao-texto">Não infectado</span>
                <div id="quadrado-0" class="quadrado-0 quadrado"></div>
            </button>

            <button id="botao-insercao-1" class="botao botao-insercao">
                <span class="botao-insercao-texto">Infectado</span>
                <div id="quadrado-1" class="quadrado-1 quadrado"></div>
            </button>

            <button id="botao-insercao-2" class="botao botao-insercao">
                <span class="botao-insercao-texto">Com Máscara</span>
                <div id="quadrado-2" class="quadrado-2 quadrado"></div>
            </button>

            <button id="botao-insercao-3" class="botao botao-insercao">
                <span class="botao-insercao-texto">Vacinado</span>
                <div id="quadrado-3" class="quadrado-3 quadrado"></div>
            </button>

        </section>

        <section class="container-infeccao">
            <div style="grid-column: 1 / span 2">
                <h1>Parâmetros de Infecção</h1>    
            </div>
            
            <div>
                <label for="input-infeccao-mascara">Probabilidade de infecção de pessoas com máscara</label>
                <input id="input-infeccao-mascara" type="number" placeholder="0.1" step="0.1" max="1" min="0"/>
            </div>

            <div>
                <label for="input-infeccao">Probabilidade de infecção de pessoas</label>
                <input id="input-infeccao" type="number" placeholder="0.1" step="0.1" max="1" min="0"/>
            </div>

            <div>
                <label for="input-infeccao-ms">Milissegundos entre rodadas</label>
                <input id="input-infeccao-ms" type="number" placeholder="5000" step="100" max="10000" min="100"/>
            </div>

        </section>

        <section class="container-inicializacao">
            <div style="grid-column: 1 / span 2">
                <h1>Parâmetros de Inicialização</h1>
                <h4>Apenas serão efetivados após reinicialização</h4>
            </div>

            <div>
                <label for="input-mascara">Probabilidade de um quadrado ser uma pessoa com máscara</label>
                <input id="input-mascara" type="number" step="0.1" max="1" min="0"/>
            </div>

            <div>
                <label for="input-vacinada">Probabilidade de um quadrado ser uma pessoa vacinada</label>
                <input id="input-vacinada" type="number" step="0.1" max="1" min="0"/>
            </div>

            <div>
                <label for="input-linhas">Quantidade de linhas</label>
                <input id="input-linhas" type="number"step="1" max="200" min="1"/>
            </div>

            <div>
                <label for="input-colunas">Quantidade de colunas</label>
                <input id="input-colunas" type="number" step="1" max="200" min="1"/>
            </div>

            <div>
                <label for="input-celulas">Tamanho das células</label>
                <input id="input-celulas" type="number" step="1" max="200" min="1"/>
            </div>

        </section>

        
    </div>
   
</div>
    <script type="module" src="js/interface.js"></script>
    <script type="module" src="js/main.js"></script>
</body>

</html>
